name: "Get GitHub App Token PowerShell"
description: "GitHub Action for creating a GitHub App installation access token using PowerShell."
author: "Benedict Schmieder"
branding:
  icon: "lock"
  color: "gray-dark"
inputs:
  app-id:
    description: "GitHub App ID"
    required: true 
  private-key:
    description: "GitHub App private key"
    required: true
outputs:
  token:
    description: "GitHub installation access token"
runs:
  using: "composite"
  steps:
    - name: Get-AppToken
      shell: pwsh
      run: |
        Import-Module $env:GITHUB_ACTION_PATH/Get-GitHubAppToken
        $accessToken = Get-GitHubAppToken -AppId "${{ inputs.app-id }}" -PrivateKey "${{ inputs.private-key }}"
        Write-Host "AccessToken 2: $accessToken"
        Write-Output "token=$($accessToken)"
        Write-Output "token=$($accessToken)" >> $GITHUB_ENV
    - name: Debug Output
      run: echo "Token: ${{ steps.app-token.outputs.token }}"
        
